id: MOF-NUM-003
name: FTextToNumber
category: Number
status: verified
summary: Liest eine localeabhängig formatierte Zahl aus einem Text.
signature:
  parameters:
  - name: text
    type: string
returns: number
properties:
  locale_aware: true
  tested_decimal_separator: ','
  tested_thousands_separator: .
  empty_string: 0
  negative_values_supported: true
research:
- MO-026
verified_builds:
- application: MonKey Office 2025
  build: 249
  platform: macOS
examples:
- expression: FTextToNumber("123")
  expected: '123'
- expression: FTextToNumber("123,45")
  expected: '123.45'
- expression: FTextToNumber("123.45")
  expected: '12345'
- expression: FTextToNumber("")
  expected: '0'
warnings:
- Das Ergebnis hängt vom eingestellten Zahlenformat bzw. der Locale ab.
- Ein Punkt wurde im getesteten deutschen Zahlenformat als Tausendertrennzeichen interpretiert.
recommendations:
- Für Geldbeträge nur verwenden, wenn das Eingabeformat zur aktiven Locale passt.
quality:
  documentation: complete
  experiments: complete
  edge_cases: complete
  regression: partial
  confidence: high
